{% extends "base.html" %}
{% block title %}{{ _('about_title') }} - {{ _('site_name') }}{% endblock %}
{% block content %}
<div class="container mt-4">
    <h2><i class="fas fa-info-circle"></i> {{ _('about_title') }}</h2>
    <div class="row mt-4">
        <div class="col-md-8">
            <p>{{ _('about_content') }}</p>
            <h5>{{ _('home_hero_title') }}</h5>
            <p>{{ _('home_hero_subtitle') }}</p>
        </div>
        <div class="col-md-4">
            <div class="card">
                <div class="card-body text-center">
                    <i class="fas fa-industry fa-4x text-primary mb-3"></i>
                    <h5>{{ _('site_name') }}</h5>
                    <p class="text-muted">2024</p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
