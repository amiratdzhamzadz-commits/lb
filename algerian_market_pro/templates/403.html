{% extends "base.html" %}
{% block title %}{{ _('error_403') }} - {{ _('site_name') }}{% endblock %}
{% block content %}
<div class="container text-center mt-5">
    <h1 class="display-1 text-danger">403</h1>
    <h3><i class="fas fa-lock"></i> {{ _('error_403') }}</h3>
    <p>{{ _('error_403_desc') }}</p>
    <a href="{{ url_for('home') }}" class="btn btn-primary">{{ _('error_go_home') }}</a>
</div>
{% endblock %}
