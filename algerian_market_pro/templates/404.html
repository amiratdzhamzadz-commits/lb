{% extends "base.html" %}
{% block title %}{{ _('error_404') }} - {{ _('site_name') }}{% endblock %}
{% block content %}
<div class="container text-center mt-5">
    <h1 class="display-1 text-warning">404</h1>
    <h3><i class="fas fa-question-circle"></i> {{ _('error_404') }}</h3>
    <p>{{ _('error_404_desc') }}</p>
    <a href="{{ url_for('home') }}" class="btn btn-primary">{{ _('error_go_home') }}</a>
</div>
{% endblock %}
